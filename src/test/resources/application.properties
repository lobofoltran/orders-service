# DevServices will automatically start PostgreSQL and RabbitMQ for tests
quarkus.flyway.migrate-at-start=true

# Disable RabbitMQ connector in tests to avoid needing a running RabbitMQ
# DevServices for RabbitMQ handles this automatically

# Outbox configuration for tests
outbox.poll.interval=off
outbox.poll.batch-size=100
outbox.retry.max=10
